version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  payment_service:
    build: .
    container_name: payment_service
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    depends_on:
      - rabbitmq
    command: ["python", "services/payment_service/app/consume_order_created.py"]

  inventory_service:
    build: .
    container_name: inventory_service
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    depends_on:
      - rabbitmq
    command: ["python", "services/inventory_service/app/consume_order_created.py"]

  notification_service:
    build: .
    container_name: notification_service
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    depends_on:
      - rabbitmq
    command: ["python", "services/notification_service/app/consume_order_created.py"]

# To add order_service or API gateway, add similar service blocks.
