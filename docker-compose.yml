version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment_service:
    build: .
    container_name: payment_service
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - PYTHONPATH=/app
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["python", "services/payment_service/app/consume_order_created.py"]

  inventory_service:
    build: .
    container_name: inventory_service
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - PYTHONPATH=/app
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["python", "services/inventory_service/app/consume_order_created.py"]

  notification_service:
    build: .
    container_name: notification_service
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - PYTHONPATH=/app
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["python", "services/notification_service/app/consume_events.py"]

  shipping_service:
    build: .
    container_name: shipping_service
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - PYTHONPATH=/app
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["python", "services/shipping_service/app/consume_events.py"]

  order_service:
    build: .
    container_name: order_service
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - PYTHONPATH=/app
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["python", "services/order_service/app/consume_events.py"]
